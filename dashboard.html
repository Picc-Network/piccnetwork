<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PICC Network — Pannello Operativo</title>
<style>
  body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; background: #0d1b2a; color: #e0e6ed; margin: 0; padding: 24px; }
  h1 { color: #ffcc00; font-size: 22px; margin-bottom: 4px; }
  .sottotitolo { color: #8899aa; font-size: 13px; margin-bottom: 24px; }
  .card { background: #16273d; border-radius: 12px; padding: 20px; margin-bottom: 16px; border-left: 4px solid #2a4a6b; }
  .card.allarme { border-left-color: #ff5555; background: #2a1414; }
  .card h2 { margin: 0 0 8px 0; font-size: 15px; color: #ffffff; }
  .valore { font-size: 28px; font-weight: bold; color: #66ffcc; }
  .card.allarme .valore { color: #ff8888; }
  .descrizione { font-size: 12px; color: #99aabb; margin-top: 6px; }
  .indirizzo { font-size: 11px; color: #667788; font-family: monospace; word-break: break-all; margin-top: 4px; }
  .badge-ok { display: inline-block; background: #1e5c3a; color: #7fffb0; font-size: 11px; padding: 2px 8px; border-radius: 10px; }
  .badge-allarme { display: inline-block; background: #7a1a1a; color: #ffb0b0; font-size: 11px; padding: 2px 8px; border-radius: 10px; }
  .link-esterni { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }
  .link-esterni a { background: #1b3a52; color: #a0d0ff; text-decoration: none; padding: 8px 14px; border-radius: 8px; font-size: 13px; }
  .link-esterni a:hover { background: #24507a; }
  .errore { color: #ff8888; padding: 16px; background: #2a1414; border-radius: 8px; }
  .timestamp { color: #556677; font-size: 11px; margin-top: 24px; }
  #loading { color: #8899aa; }
  #login-box { max-width: 320px; margin: 80px auto; text-align: center; }
  #login-box input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #2a4a6b; background: #16273d; color: #fff; font-size: 15px; box-sizing: border-box; margin-bottom: 12px; }
  #login-box button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #ffcc00; color: #0d1b2a; font-weight: bold; font-size: 15px; cursor: pointer; }
  #login-errore { color: #ff8888; font-size: 13px; margin-top: 10px; min-height: 18px; }

  .tabella-commercianti { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 13px; }
  .tabella-commercianti th { text-align: left; color: #8899aa; font-weight: normal; padding: 6px 8px; border-bottom: 1px solid #2a4a6b; }
  .tabella-commercianti td { padding: 8px; border-bottom: 1px solid #1e3348; vertical-align: top; }
  .tabella-commercianti .piva { color: #99aabb; font-size: 12px; }
  .tabella-commercianti .indirizzo { margin-top: 2px; }
  .btn-rimuovi { background: #7a1a1a; color: #ffb0b0; border: none; padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; }
  .btn-rimuovi:hover { background: #a02020; }
  .btn-rimuovi:disabled { opacity: 0.5; cursor: not-allowed; }
  .form-commerciante { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; padding-top: 16px; border-top: 1px solid #2a4a6b; }
  .form-commerciante input { flex: 1 1 160px; padding: 10px; border-radius: 6px; border: 1px solid #2a4a6b; background: #0d1b2a; color: #fff; font-size: 13px; box-sizing: border-box; }
  .btn-aggiungi { background: #ffcc00; color: #0d1b2a; border: none; padding: 10px 18px; border-radius: 6px; font-weight: bold; font-size: 13px; cursor: pointer; }
  .btn-aggiungi:hover { background: #ffd633; }
  .btn-aggiungi:disabled { opacity: 0.5; cursor: not-allowed; }
  .msg-commercianti { font-size: 12px; margin-top: 8px; min-height: 16px; }
  .msg-commercianti.ok { color: #7fffb0; }
  .msg-commercianti.errore-testo { color: #ff8888; }
  .vuoto-commercianti { color: #667788; font-size: 13px; padding: 10px 0; }
  .toggle-switch { position: relative; display: inline-block; width: 42px; height: 24px; }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #4a4a4a; transition: .2s; border-radius: 24px; }
  .toggle-slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .2s; border-radius: 50%; }
  .toggle-switch input:checked + .toggle-slider { background-color: #1e5c3a; }
  .toggle-switch input:checked + .toggle-slider:before { transform: translateX(18px); }
  .toggle-switch input:disabled + .toggle-slider { opacity: 0.4; cursor: not-allowed; }
  .btn-modifica { background: #1b3a52; color: #a0d0ff; border: none; padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; margin-left: 6px; }
  .btn-modifica:hover { background: #24507a; }
  .azioni-riga { display: flex; align-items: center; gap: 8px; }
</style>
</head>
<body>
  <div id="login-box">
    <h1>🔒 PICC Network</h1>
    <div class="sottotitolo">Inserisci la password per accedere al pannello</div>
    <input type="password" id="password-input" placeholder="Password" autofocus>
    <button onclick="verificaPassword()">ACCEDI</button>
    <div id="login-errore"></div>
  </div>

  <div id="dashboard-content" style="display:none;">
  <h1>PICC Network — Pannello Operativo</h1>
  <div class="sottotitolo">Stato delle risorse critiche in tempo reale</div>
  <div id="contenuto"><p id="loading">Caricamento...</p></div>

  <div class="card">
    <h2>🏪 Commercianti</h2>
    <div id="contenuto-commercianti"><p id="loading-commercianti">Caricamento commercianti...</p></div>

    <div class="form-commerciante">
      <input type="text" id="nuovo-indirizzo" placeholder="Indirizzo 0x...">
      <input type="text" id="nuovo-nome" placeholder="Nome attività">
      <input type="text" id="nuovo-piva" placeholder="Partita IVA (opzionale)">
      <button class="btn-aggiungi" id="btn-aggiungi-commerciante" onclick="aggiungiCommerciante()">+ Registra commerciante</button>
    </div>
    <div class="msg-commercianti" id="msg-commercianti"></div>
  </div>
  </div>

  <script>
    let passwordSalvata = sessionStorage.getItem('picc_dashboard_password') || '';

    async function verificaPassword() {
      const input = document.getElementById('password-input');
      passwordSalvata = input.value;
      const errore = document.getElementById('login-errore');
      errore.textContent = '';
      const ok = await caricaStato();
      if (ok) {
        sessionStorage.setItem('picc_dashboard_password', passwordSalvata);
        document.getElementById('login-box').style.display = 'none';
        document.getElementById('dashboard-content').style.display = 'block';
        caricaCommercianti();
        setInterval(caricaStato, 60000);
      } else {
        errore.textContent = 'Password errata, riprova.';
      }
    }

    async function caricaStato() {
      const contenuto = document.getElementById('contenuto');
      try {
        const risposta = await fetch('/api/status', {
          headers: { 'x-dashboard-password': passwordSalvata }
        });
        const dati = await risposta.json();
        if (risposta.status === 401) return false;
        if (!risposta.ok) throw new Error(dati.error || 'Errore sconosciuto');

        const w = dati.wallets;
        contenuto.innerHTML = `
          <div class="card ${w.relayer.allarme ? 'allarme' : ''}">
            <h2>⛽ Relayer — carburante per le transazioni gratuite ${w.relayer.allarme ? '<span class="badge-allarme">SOTTO SOGLIA</span>' : '<span class="badge-ok">OK</span>'}</h2>
            <div class="valore">${w.relayer.pol.toFixed(4)} POL</div>
            <div class="descrizione">${w.relayer.descrizione}</div>
            <div class="indirizzo">${w.relayer.address}</div>
          </div>
          <div class="card ${w.deployer.allarme ? 'allarme' : ''}">
            <h2>🔧 Deployer ${w.deployer.allarme ? '<span class="badge-allarme">SOTTO SOGLIA</span>' : '<span class="badge-ok">OK</span>'}</h2>
            <div class="valore">${w.deployer.pol.toFixed(4)} POL</div>
            <div class="descrizione">${w.deployer.picc.toFixed(2)} PICC — ${w.deployer.descrizione}</div>
            <div class="indirizzo">${w.deployer.address}</div>
          </div>
          <div class="card">
            <h2>🏦 Treasury / Wallet Personale</h2>
            <div class="valore">${w.treasury.picc.toFixed(2)} PICC</div>
            <div class="descrizione">${w.treasury.pol.toFixed(4)} POL — ${w.treasury.descrizione}</div>
            <div class="indirizzo">${w.treasury.address}</div>
          </div>
          <div class="card">
            <h2>💰 Riserva Incentivi</h2>
            <div class="valore">${w.riservaIncentivi.picc.toFixed(2)} PICC</div>
            <div class="descrizione">${w.riservaIncentivi.pol.toFixed(4)} POL — ${w.riservaIncentivi.descrizione}</div>
            <div class="indirizzo">${w.riservaIncentivi.address}</div>
          </div>
          <div class="link-esterni">
            <a href="${dati.linkEsterni.alchemyDashboard}" target="_blank">📊 Alchemy (CU rimanenti)</a>
            <a href="${dati.linkEsterni.vercelDashboard}" target="_blank">▲ Vercel (log & invocazioni)</a>
            <a href="${dati.linkEsterni.firebaseConsole}" target="_blank">🔥 Firebase (Firestore & FCM)</a>
            <a href="${dati.linkEsterni.polygonscanRelayer}" target="_blank">🔍 Polygonscan Relayer</a>
            <a href="${dati.linkEsterni.polygonscanTreasury}" target="_blank">🔍 Polygonscan Treasury</a>
            <a href="${dati.linkEsterni.polygonscanRiserva}" target="_blank">🔍 Polygonscan Riserva</a>
          </div>
          <div class="timestamp">Blocco Polygon #${dati.blockNumber} — aggiornato ${new Date(dati.timestamp).toLocaleString('it-IT')}</div>
        `;
        return true;
      } catch (e) {
        contenuto.innerHTML = `<div class="errore">Errore nel caricamento dello stato: ${e.message}</div>`;
        return true; // errore diverso da password sbagliata: mostriamo comunque il pannello con l'errore
      }
    }

    function escapeHtml(testo) {
      const div = document.createElement('div');
      div.textContent = testo == null ? '' : String(testo);
      return div.innerHTML;
    }

    async function caricaCommercianti() {
      const contenuto = document.getElementById('contenuto-commercianti');
      try {
        const risposta = await fetch('/api/commercianti', {
          headers: { 'x-dashboard-password': passwordSalvata }
        });
        const dati = await risposta.json();
        if (!risposta.ok) throw new Error(dati.error || 'Errore sconosciuto');

        if (!dati.commercianti.length) {
          contenuto.innerHTML = '<div class="vuoto-commercianti">Nessun commerciante registrato tramite questo pannello.</div>';
          return;
        }

        const righe = dati.commercianti.map(c => {
          let badge;
          if (c.rimossoIl) {
            const dataRimozione = new Date(c.rimossoIl).toLocaleDateString('it-IT');
            badge = `<span class="badge-allarme">RIMOSSO IL ${dataRimozione}</span>`;
          } else if (c.attivoOnChain === true) {
            badge = '<span class="badge-ok">ATTIVO</span>';
          } else if (c.attivoOnChain === false) {
            badge = '<span class="badge-allarme">NON ATTIVO</span>';
          } else {
            badge = '<span class="badge-allarme">NON VERIFICABILE</span>';
          }

          return `
            <tr>
              <td>
                ${escapeHtml(c.nome) || '<em>(senza nome)</em>'}
                ${c.partitaIva ? `<div class="piva">P.IVA ${escapeHtml(c.partitaIva)}</div>` : ''}
                <div class="indirizzo">${escapeHtml(c.indirizzo)}</div>
              </td>
              <td>${badge}</td>
              <td>
                <div class="azioni-riga">
                  ${c.rimossoIl ? '' : `
                    <label class="toggle-switch" title="${c.attivoOnChain ? 'Disattiva' : 'Attiva'}">
                      <input type="checkbox" ${c.attivoOnChain ? 'checked' : ''}
                        onchange="toggleCommerciante('${c.indirizzo}', ${c.attivoOnChain === true}, this)">
                      <span class="toggle-slider"></span>
                    </label>
                    <button class="btn-modifica" onclick="modificaCommerciante('${c.indirizzo}', '${escapeHtml(c.nome || '').replace(/'/g, "\\'")}', '${escapeHtml(c.partitaIva || '').replace(/'/g, "\\'")}')">Modifica</button>
                    <button class="btn-rimuovi" onclick="rimuoviCommerciante('${c.indirizzo}', this)">Rimuovi</button>
                  `}
                </div>
              </td>
            </tr>
          `;
        }).join('');

        contenuto.innerHTML = `
          <table class="tabella-commercianti">
            <thead>
              <tr><th>Attività</th><th>Stato</th><th></th></tr>
            </thead>
            <tbody>${righe}</tbody>
          </table>
        `;
      } catch (e) {
        contenuto.innerHTML = `<div class="errore">Errore nel caricamento dei commercianti: ${escapeHtml(e.message)}</div>`;
      }
    }

    async function aggiungiCommerciante() {
      const indirizzo = document.getElementById('nuovo-indirizzo').value.trim();
      const nome = document.getElementById('nuovo-nome').value.trim();
      const partitaIva = document.getElementById('nuovo-piva').value.trim();
      const msg = document.getElementById('msg-commercianti');
      const bottone = document.getElementById('btn-aggiungi-commerciante');

      msg.className = 'msg-commercianti';
      msg.textContent = '';

      if (!indirizzo || !nome) {
        msg.className = 'msg-commercianti errore-testo';
        msg.textContent = 'Indirizzo e nome attività sono obbligatori.';
        return;
      }

      bottone.disabled = true;
      bottone.textContent = 'Registrazione in corso...';
      try {
        const risposta = await fetch('/api/commercianti', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-dashboard-password': passwordSalvata
          },
          body: JSON.stringify({ azione: 'aggiungi', indirizzo, nome, partitaIva })
        });
        const dati = await risposta.json();
        if (!risposta.ok) throw new Error(dati.details ? `${dati.error}: ${dati.details}` : (dati.error || 'Errore sconosciuto'));

        msg.className = 'msg-commercianti ok';
        msg.textContent = `Commerciante registrato (tx ${dati.txHash.slice(0, 10)}...).`;
        document.getElementById('nuovo-indirizzo').value = '';
        document.getElementById('nuovo-nome').value = '';
        document.getElementById('nuovo-piva').value = '';
        await caricaCommercianti();
      } catch (e) {
        msg.className = 'msg-commercianti errore-testo';
        msg.textContent = `Errore: ${e.message}`;
      } finally {
        bottone.disabled = false;
        bottone.textContent = '+ Registra commerciante';
      }
    }

    async function toggleCommerciante(indirizzo, statoAttuale, checkbox) {
      const nuovoStato = !statoAttuale;
      checkbox.disabled = true;
      const msg = document.getElementById('msg-commercianti');
      msg.className = 'msg-commercianti';
      msg.textContent = 'Aggiornamento in corso...';
      try {
        const risposta = await fetch('/api/commercianti', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-dashboard-password': passwordSalvata },
          body: JSON.stringify({ azione: nuovoStato ? 'attiva' : 'disattiva', indirizzo })
        });
        const dati = await risposta.json();
        if (!risposta.ok) throw new Error(dati.details ? `${dati.error}: ${dati.details}` : (dati.error || 'Errore sconosciuto'));

        msg.className = 'msg-commercianti ok';
        msg.textContent = `Commerciante ${nuovoStato ? 'attivato' : 'disattivato'} (tx ${dati.txHash.slice(0, 10)}...).`;
        await caricaCommercianti();
      } catch (e) {
        checkbox.checked = statoAttuale; // ripristina lo stato visivo se fallisce
        checkbox.disabled = false;
        msg.className = 'msg-commercianti errore-testo';
        msg.textContent = `Errore: ${e.message}`;
      }
    }

    async function modificaCommerciante(indirizzo, nomeAttuale, pivaAttuale) {
      const nuovoNome = prompt('Nome attività:', nomeAttuale);
      if (nuovoNome === null) return; // annullato
      if (!nuovoNome.trim()) {
        alert('Il nome non può essere vuoto.');
        return;
      }
      const nuovaPiva = prompt('Partita IVA (lascia vuoto se non disponibile):', pivaAttuale);
      if (nuovaPiva === null) return; // annullato

      const msg = document.getElementById('msg-commercianti');
      msg.className = 'msg-commercianti';
      msg.textContent = 'Salvataggio in corso...';
      try {
        const risposta = await fetch('/api/commercianti', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-dashboard-password': passwordSalvata },
          body: JSON.stringify({ azione: 'modifica', indirizzo, nome: nuovoNome.trim(), partitaIva: nuovaPiva.trim() })
        });
        const dati = await risposta.json();
        if (!risposta.ok) throw new Error(dati.details ? `${dati.error}: ${dati.details}` : (dati.error || 'Errore sconosciuto'));

        msg.className = 'msg-commercianti ok';
        msg.textContent = 'Dati commerciante aggiornati.';
        await caricaCommercianti();
      } catch (e) {
        msg.className = 'msg-commercianti errore-testo';
        msg.textContent = `Errore: ${e.message}`;
      }
    }

    async function rimuoviCommerciante(indirizzo, bottone) {
      if (!confirm(`Rimuovere il commerciante ${indirizzo}?\n\nSe non ha mai avuto movimenti PICC, verrà eliminato del tutto dall'anagrafica. Se ne ha già avuti, verrà solo disattivato (non genererà più backflow), mantenendo lo storico.`)) return;
      const msg = document.getElementById('msg-commercianti');
      msg.className = 'msg-commercianti';
      msg.textContent = '';

      bottone.disabled = true;
      bottone.textContent = 'Rimozione...';
      try {
        const risposta = await fetch('/api/commercianti', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-dashboard-password': passwordSalvata
          },
          body: JSON.stringify({ azione: 'rimuovi', indirizzo })
        });
        const dati = await risposta.json();
        if (!risposta.ok) throw new Error(dati.details ? `${dati.error}: ${dati.details}` : (dati.error || 'Errore sconosciuto'));

        msg.className = 'msg-commercianti ok';
        msg.textContent = dati.eliminatoDelTutto
          ? `Commerciante eliminato del tutto (nessun movimento pregresso) — tx ${dati.txHash.slice(0, 10)}...`
          : `Commerciante disattivato (aveva già movimenti, storico conservato) — tx ${dati.txHash.slice(0, 10)}...`;
        await caricaCommercianti();
      } catch (e) {
        msg.className = 'msg-commercianti errore-testo';
        msg.textContent = `Errore: ${e.message}`;
        bottone.disabled = false;
        bottone.textContent = 'Rimuovi';
      }
    }

    // Se la password è già salvata in questa sessione del browser, entra subito senza richiederla di nuovo
    if (passwordSalvata) {
      caricaStato().then(ok => {
        if (ok) {
          document.getElementById('login-box').style.display = 'none';
          document.getElementById('dashboard-content').style.display = 'block';
          caricaCommercianti();
          setInterval(caricaStato, 60000);
        }
      });
    }

    document.getElementById('password-input').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') verificaPassword();
    });
  </script>
</body>
</html>
